name: Admin Panel CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: admin-panel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  deploy:
    name: Deploy To DigitalOcean
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - name: Validate required deploy secrets
        run: |
          missing=0
          for key in DO_SSH_HOST DO_SSH_USER DO_SSH_PRIVATE_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
        env:
          DO_SSH_HOST: ${{ secrets.DO_SSH_HOST }}
          DO_SSH_USER: ${{ secrets.DO_SSH_USER }}
          DO_SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh

          # Support both true multiline secrets and escaped "\\n" one-line secrets.
          raw_key="${{ secrets.DO_SSH_PRIVATE_KEY }}"
          if printf "%s" "$raw_key" | grep -q '\\n'; then
            printf "%b" "$raw_key" | tr -d '\r' > ~/.ssh/do_deploy_key
          else
            printf "%s" "$raw_key" | tr -d '\r' > ~/.ssh/do_deploy_key
          fi

          chmod 600 ~/.ssh/do_deploy_key

          # Fail early if the private key is malformed or wrong.
          if ! ssh-keygen -y -f ~/.ssh/do_deploy_key > /dev/null 2>&1; then
            echo "Invalid DO_SSH_PRIVATE_KEY format."
            echo "Expected full OpenSSH private key with BEGIN/END lines."
            exit 1
          fi

          target_port="${{ secrets.DO_SSH_PORT }}"
          if [ -z "$target_port" ]; then
            target_port="22"
          fi
          ssh-keyscan -p "$target_port" -H "${{ secrets.DO_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: SSH preflight
        env:
          SSH_PORT: ${{ secrets.DO_SSH_PORT }}
        run: |
          target_port="${SSH_PORT:-22}"
          ssh \
            -i ~/.ssh/do_deploy_key \
            -p "$target_port" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" \
            "echo 'SSH preflight ok on host:' \"\$(hostname)\""

      - name: Deploy via rsync over SSH
        env:
          DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH }}
          SSH_PORT: ${{ secrets.DO_SSH_PORT }}
        run: |
          target_path="${DEPLOY_PATH:-/var/www/masterreactnative.dev}"
          target_port="${SSH_PORT:-22}"

          ssh \
            -i ~/.ssh/do_deploy_key \
            -p "$target_port" \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}" \
            "mkdir -p '$target_path'"

          rsync -az --delete \
            -e "ssh -i ~/.ssh/do_deploy_key -p $target_port -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=yes" \
            dist/ "${{ secrets.DO_SSH_USER }}@${{ secrets.DO_SSH_HOST }}:$target_path/"
