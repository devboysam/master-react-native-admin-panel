name: Admin Panel CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: admin-panel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist

  deploy:
    name: Deploy To DigitalOcean
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - name: Validate required deploy secrets
        run: |
          missing=0
          if [ -z "$DO_SSH_PRIVATE_KEY" ]; then
            echo "Missing required secret: DO_SSH_PRIVATE_KEY"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
        env:
          DO_SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh

          raw_key="${{ secrets.DO_SSH_PRIVATE_KEY }}"
          tmp_decoded="$(mktemp)"

          # Reset key file each run.
          : > ~/.ssh/do_deploy_key

          if printf "%s" "$raw_key" | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
            # Support raw multiline OpenSSH key in DO_SSH_PRIVATE_KEY.
            printf "%s" "$raw_key" | tr -d '\r' > ~/.ssh/do_deploy_key
          elif printf "%s" "$raw_key" | grep -q '\\n'; then
            # Support escaped "\\n" one-line secrets.
            printf "%b" "$raw_key" | tr -d '\r' > ~/.ssh/do_deploy_key
          # If DO_SSH_PRIVATE_KEY contains base64 text, decode it automatically.
          elif [ -n "$raw_key" ]; then
            sanitized_raw="$(printf "%s" "$raw_key" | tr -d '\r\n\t ')"
            if printf "%s" "$sanitized_raw" | base64 --decode 2>/dev/null | tr -d '\r' > "$tmp_decoded" && grep -q "BEGIN OPENSSH PRIVATE KEY" "$tmp_decoded"; then
              cat "$tmp_decoded" > ~/.ssh/do_deploy_key
            elif printf "%s" "$sanitized_raw" | openssl base64 -d -A 2>/dev/null | tr -d '\r' > "$tmp_decoded" && grep -q "BEGIN OPENSSH PRIVATE KEY" "$tmp_decoded"; then
              cat "$tmp_decoded" > ~/.ssh/do_deploy_key
            else
              # Fall back to raw value (final validator below will reject malformed keys).
              printf "%s" "$raw_key" | tr -d '\r' > ~/.ssh/do_deploy_key
            fi
          else
            echo "DO_SSH_PRIVATE_KEY is empty."
            exit 1
          fi

          rm -f "$tmp_decoded"

          chmod 600 ~/.ssh/do_deploy_key

          # Fail early if the private key is malformed or wrong.
          if ! ssh-keygen -y -f ~/.ssh/do_deploy_key > /dev/null 2>&1; then
            echo "Invalid DO_SSH_PRIVATE_KEY format."
            echo "Expected a valid OpenSSH private key (raw multiline, escaped \\n, or base64)."
            exit 1
          fi

          target_port="${{ secrets.DO_SSH_PORT }}"
          if [ -z "$target_port" ]; then
            target_port="22"
          fi
          ssh-keyscan -p "$target_port" -H "165.232.190.21" >> ~/.ssh/known_hosts

      - name: SSH preflight
        env:
          SSH_PORT: ${{ secrets.DO_SSH_PORT }}
        run: |
          target_port="${SSH_PORT:-22}"
          ssh \
            -i ~/.ssh/do_deploy_key \
            -p "$target_port" \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o StrictHostKeyChecking=yes \
            "root@165.232.190.21" \
            "echo 'SSH preflight ok on host:' \"\$(hostname)\""

      - name: Deploy via rsync over SSH
        env:
          DEPLOY_PATH: ${{ secrets.DO_DEPLOY_PATH }}
          SSH_PORT: ${{ secrets.DO_SSH_PORT }}
        run: |
          target_path_raw="${DEPLOY_PATH:-/var/www/admin}"
          target_path="$(printf "%s" "$target_path_raw" | tr -d '\r' | head -n 1)"
          target_path="${target_path%/}"
          if [ -z "$target_path" ]; then
            target_path="/var/www/admin"
          fi

          if ! printf "%s" "$target_path" | grep -Eq '^/[A-Za-z0-9._/-]+$'; then
            echo "Invalid DO_DEPLOY_PATH value: must be an absolute unix path like /var/www/admin"
            exit 1
          fi

          if [ "$target_path" = "/" ]; then
            echo "Refusing to deploy to root directory (/)."
            exit 1
          fi

          target_port="${SSH_PORT:-22}"

          rsync -az --delete \
            --rsync-path="mkdir -p '$target_path' && rsync" \
            -e "ssh -i ~/.ssh/do_deploy_key -p $target_port -o IdentitiesOnly=yes -o BatchMode=yes -o ConnectTimeout=15 -o StrictHostKeyChecking=yes" \
            dist/ "root@165.232.190.21:$target_path/"
